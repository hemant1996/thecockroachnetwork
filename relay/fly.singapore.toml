app = 'cockroach-relay-singapore'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  DB = '/data/relay.db'
  PORT = '7447'
  RETENTION_DAYS = '90'
  COCKROACH_PEERS = 'wss://cockroach-relay-hemant1996.fly.dev'
  COCKROACH_SELF = 'wss://cockroach-relay-singapore.fly.dev'

[[mounts]]
  source = 'cockroach_data'
  destination = '/data'

[http_service]
  internal_port = 7447
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpus = 1
  memory_mb = 256
