# fly.toml app configuration file generated for cockroach-relay-hemant1996 on 2026-05-20T17:09:53+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'cockroach-relay-hemant1996'
primary_region = 'bom'

[build]
  dockerfile = 'Dockerfile'

[env]
  DB = '/data/relay.db'
  PORT = '7447'
  RETENTION_DAYS = '90'

[[mounts]]
  source = 'cockroach_data'
  destination = '/data'

[http_service]
  internal_port = 7447
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpus = 1
  memory_mb = 256
