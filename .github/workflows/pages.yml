# Deploys the static site (root index.html, web/, client/, docs, spec, whitepaper)
# to GitHub Pages on every push to main.  Uses the official Pages Actions —
# no Jekyll, no build step, just upload-and-deploy.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required permissions for actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; later pushes wait for the current one to finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the whole repo — Pages serves it literally; relative paths
          # in the root index.html assume this layout.
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
