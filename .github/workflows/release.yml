# Builds standalone executables for all 5 supported platforms when a version
# tag is pushed (or via manual dispatch), then publishes them to a GitHub
# Release.  Bun supports cross-compilation so we build everything on one
# ubuntu-latest runner — fast, cheap, and the binaries are byte-identical to
# what users would build on their own machine.

name: Release binaries

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create (e.g. v0.1.0)'
        required: true

permissions:
  contents: write    # to create the release + upload assets

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            artifact: cockroach-relay-linux-x64
          - target: bun-linux-arm64
            artifact: cockroach-relay-linux-arm64
          - target: bun-darwin-x64
            artifact: cockroach-relay-darwin-x64
          - target: bun-darwin-arm64
            artifact: cockroach-relay-darwin-arm64
          - target: bun-windows-x64
            artifact: cockroach-relay-windows-x64.exe
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install relay deps
        working-directory: relay
        run: bun install --production --frozen-lockfile

      - name: Compile ${{ matrix.target }}
        working-directory: relay
        run: |
          bun build --compile --minify --sourcemap=none \
            --target=${{ matrix.target }} \
            server.ts \
            --outfile ../${{ matrix.artifact }}

      - name: Set executable bit (Unix targets only)
        if: matrix.target != 'bun-windows-x64'
        run: chmod +x ${{ matrix.artifact }}

      - name: Create start.command (Mac/Linux double-click launcher)
        if: matrix.target != 'bun-windows-x64'
        run: |
          cat > start.command <<'EOF'
          #!/bin/bash
          # Cockroach Relay — double-click to run.
          # Strips the macOS quarantine flag, sets +x, then execs the binary.
          cd "$(dirname "$0")"
          BINARY="$(ls cockroach-relay-* 2>/dev/null | grep -Ev '\.(command|sha256|sh|bat)$' | head -1)"
          if [ -z "$BINARY" ]; then
            echo "✗ Cannot find cockroach-relay binary in $(pwd)"
            read -p "Press Enter to close..." _
            exit 1
          fi
          xattr -cr "./$BINARY" 2>/dev/null || true
          chmod +x "./$BINARY" || true
          clear
          exec "./$BINARY"
          EOF
          chmod +x start.command

      - name: Create start.bat (Windows double-click launcher)
        if: matrix.target == 'bun-windows-x64'
        run: |
          cat > start.bat <<'EOF'
          @echo off
          cd /d "%~dp0"
          for %%f in (cockroach-relay-*.exe) do (
            "%%f"
            goto :done
          )
          echo Could not find cockroach-relay .exe
          pause
          :done
          pause
          EOF

      - name: Archive as .tar.gz (Mac/Linux — includes binary + launcher)
        if: matrix.target != 'bun-windows-x64'
        run: tar -czvf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }} start.command

      - name: Archive as .zip (Windows — includes binary + launcher)
        if: matrix.target == 'bun-windows-x64'
        run: zip ${{ matrix.artifact }}.zip ${{ matrix.artifact }} start.bat

      - name: SHA256 checksums (binary + archive)
        run: shasum -a 256 ${{ matrix.artifact }}* > ${{ matrix.artifact }}.sha256

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}-bundle
          path: ${{ matrix.artifact }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          merge-multiple: true

      - name: Inventory
        run: ls -lh cockroach-relay-*

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: cockroach-relay-*
          generate_release_notes: true
          body: |
            Standalone executables for the Cockroach Relay reference implementation.

            **Operator path.** If you just want to USE the network, open the [client PWA](https://thecockroachnetwork.com/) on your phone instead — zero download, zero install, auto-generated keypair. Binaries are for people running their own relay.

            ## Download for your platform

            | Platform | Archive (recommended) | Raw binary |
            |---|---|---|
            | Mac (Apple Silicon — M1/M2/M3/M4) | `cockroach-relay-darwin-arm64.tar.gz` | `cockroach-relay-darwin-arm64` |
            | Mac (Intel) | `cockroach-relay-darwin-x64.tar.gz` | `cockroach-relay-darwin-x64` |
            | Windows | `cockroach-relay-windows-x64.zip` | `cockroach-relay-windows-x64.exe` |
            | Linux (x86_64) | `cockroach-relay-linux-x64.tar.gz` | `cockroach-relay-linux-x64` |
            | Linux (ARM — Raspberry Pi 4/5) | `cockroach-relay-linux-arm64.tar.gz` | `cockroach-relay-linux-arm64` |

            **Download the archive, not the raw binary.** Archives preserve the executable bit, so you skip `chmod +x`. Each binary is ~70 MB and bundles Bun + SQLite + the relay code into a single file.

            ## Mac and Linux

            ```
            tar -xzf cockroach-relay-darwin-arm64.tar.gz
            ./cockroach-relay-darwin-arm64
            ```

            (Or double-click the `.tar.gz` to extract via Archive Utility on Mac.)

            ## Windows

            Double-click the `.zip` to extract. Double-click the `.exe` inside.

            ## First-run warnings (unsigned binaries — v0.1)

            - **macOS Gatekeeper:** the first run is blocked because the binary isn't signed. Allow with `xattr -d com.apple.quarantine cockroach-relay-darwin-arm64`, or right-click the file in Finder → **Open** → **Open**.
            - **Windows SmartScreen:** warns *"Windows protected your PC."* Click **More info** → **Run anyway**.

            These steps cannot be eliminated without Apple ($99/yr) and Microsoft ($200–500/yr) developer certificates, which aren't in the v0.1 budget. v0.2 ships a WebRTC peer-relay mode (every PWA install = a relay, no download).

            ## Verify your download

            Each archive ships with a `.sha256` checksum file:

            ```
            shasum -a 256 -c cockroach-relay-darwin-arm64.sha256
            ```

            Don't trust the build pipeline? Reproduce the binaries locally:

            ```
            git clone https://github.com/hemant1996/thecockroachnetwork
            cd thecockroachnetwork
            ./relay/scripts/build-binaries.sh
            ```

            ## Joining the public network

            Running on `localhost` reaches only your own machine. To be part of the network: TLS reverse proxy + open port, or Tor hidden service. Both recipes in [`relay/RUN.md`](https://github.com/hemant1996/thecockroachnetwork/blob/main/relay/RUN.md).
